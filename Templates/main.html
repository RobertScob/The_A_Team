<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Campus Marketplace</title>
  <link rel="stylesheet" href="main.css" />
</head>

<body>
<header class="header">
    <div class="header-left">
        <a href="main.html"><img src="logo.png" class="icon"></a>
        <h3>Campus Marketplace</h3>
    </div>

    <div class="header-center">
        <input type="text" placeholder="Search items..." class="search-bar">
    </div>

    <div class="header-right">
        <div class="balance"><!-- balance --></div>
        <a href="registration.html" class="secbtn">Register</a>
    </div>
</header>

<div class="marketplace-container">

    <!-- Here's the sidebar -->
    <aside class="sidebar">
        <h3>Categories</h3>
        <ul>
            <li class="active">All</li>
            <li>Furniture</li>
            <li>Electronics</li>
            <li>Clothing</li>
            <li>Stationery</li>
            <li>Books</li>
            <li>Sports</li>
        </ul>
    </aside>

    <main class="content">

        <h2>All Items</h2>
        <p class="item-count"><!-- items available --></p>

        <div class="item-grid">

            <div class="item-card">
                <div class="item-img"></div>
                <h4><!-- item --></h4>
                <p class="seller"><!-- username --></p>
                <p class="price"><!-- price --></p>
                <span class="tag"><!-- tag --></span>
            </div>

            <div class="item-card">
                <div class="item-img"></div>
                <h4><!-- item --></h4>
                <p class="seller"><!-- usename --></p>
                <p class="price"><!-- price --></p>
                <span class="tag"><!-- tag --></span>
            </div>

            <div class="item-card">
                <div class="item-img"></div>
                <h4><!-- item --></h4>
                <p class="seller"><!-- usename --></p>
                <p class="price"><!-- price --></p>
                <span class="tag"><!-- tag --></span>
            </div>

        </div>
    </main>

</div>

</body>
</html>
